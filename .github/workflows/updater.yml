name: Update Reestr

on:
  schedule:
    - cron: '0 */96 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download files
        run: |
          pip3 install requests
          python3 .github/workflows/working/generate-rulist-by-filters.py
          python3 .github/workflows/working/generate-ipset.py

      - name: Commit and push changes
        run: |
          git config user.name "sevcator"
          git config user.email "68725282+sevcator@users.noreply.github.com"
          git add reestr_filtered.txt
          git add ipset-service.txt
          git diff --cached --quiet || git commit -m "⚡ Update at $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin HEAD:main || echo "No changes to push"
